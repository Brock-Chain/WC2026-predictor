name: Refresh predictions

# Auto-refresh the hosted page WITHOUT any local run. On a schedule (and on
# demand) this pulls live results + odds from Polymarket, regenerates the page,
# and commits it; Vercel's Git integration redeploys the static site on push.
#
# Results come from Polymarket (real-time, settled scores) — NOT martj42, which
# is only the historical/training feed. No martj42 download, no MCMC refit: the
# job reuses the committed trace and needs only the slim render dependencies
# (~1-2 min). Live odds also refresh client-side in the browser, independently.

on:
  schedule:
    - cron: "0 */2 * * *"      # every 2 hours (UTC); GitHub cron may lag ~15-60m
  workflow_dispatch: {}          # manual "Run workflow" button

permissions:
  contents: write                # allow the bot to push the regenerated page

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install render dependencies (no PyMC)
        run: |
          pip install -r requirements-render.txt
          pip install -e . --no-deps

      - name: Re-render (live Polymarket results + odds; no martj42, no refit)
        run: |
          python run_pipeline.py render
          mkdir -p public
          cp wc2026_predictions.html public/index.html

      - name: Commit & push if the page changed
        run: |
          git config user.name  "wc2026-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/index.html wc2026_predictions.html
          if git diff --cached --quiet; then
            echo "No change — nothing to deploy."
          else
            git commit -m "Auto-refresh predictions [skip ci]"
            git push
          fi
